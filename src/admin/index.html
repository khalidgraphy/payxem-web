<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="robots" content="noindex">
  <title>Payxem CMS Admin</title>
  <link rel="icon" type="image/png" href="/images/PayXem-Icon.png">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --px-brand: #1A3060;
      --px-brand-dark: #0F1D3D;
      --px-teal: #2BC4C0;
      --px-teal-dark: #1FA8A4;
      --px-bg: #F7F8FC;
      --px-text-muted: #718096;
      --px-border: #E2E8F0;
    }

    body {
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
      -webkit-font-smoothing: antialiased;
    }

    /* Login screen background */
    [class*="LoginPage"] {
      background: linear-gradient(160deg, #fff 0%, var(--px-bg) 50%, #EEF2F9 100%) !important;
    }

    /* Hide Decap logo, replaced by our brand header */
    [class*="CustomIconWrapper"],
    [class*="NetlifyLogoIcon"] {
      display: none !important;
    }

    /* Hide Decap footer branding */
    [class*="LoginPage"] > div:last-child [class*="netlify"],
    [class*="LoginPage"] [class*="AppFooter"],
    [class*="LoginPage"] > div > a[href*="decap"],
    [class*="LoginPage"] > div > a[href*="netlify"] {
      display: none !important;
    }

    /* Collapse the big empty space in the login form */
    [class*="LoginPage"] [class*="LoginContainer"],
    [class*="LoginPage"] > div {
      padding-top: 0 !important;
      margin-top: 0 !important;
    }

    /* App header / top bar (after login) */
    [class*="AppHeader"] {
      background-color: var(--px-brand) !important;
    }
    [class*="AppHeader"] a,
    [class*="AppHeader"] span {
      font-family: 'Inter', sans-serif !important;
    }

    /* Sidebar */
    [class*="Sidebar"] {
      font-family: 'Inter', sans-serif !important;
    }

    /* Custom login header */
    #payxem-login-brand {
      text-align: center;
      padding: 40px 0 8px;
      position: relative;
      z-index: 10;
    }
    #payxem-login-brand img {
      height: 32px;
      margin-bottom: 8px;
    }
    #payxem-login-brand h1 {
      font-family: 'Inter', sans-serif;
      font-size: 1rem;
      font-weight: 600;
      color: var(--px-brand);
      letter-spacing: -0.01em;
      margin: 0;
    }

    /* Footer */
    #payxem-cms-footer {
      position: fixed;
      bottom: 0;
      left: 0;
      right: 0;
      text-align: center;
      padding: 10px 16px;
      font-family: 'Inter', sans-serif;
      font-size: 0.6875rem;
      color: var(--px-text-muted);
      background: #fff;
      border-top: 1px solid var(--px-border);
      z-index: 100;
    }
    #payxem-cms-footer a {
      color: var(--px-teal);
      text-decoration: none;
      font-weight: 500;
    }
    #payxem-cms-footer a:hover {
      color: var(--px-teal-dark);
      text-decoration: underline;
    }
  </style>
</head>
<body>
  <div id="payxem-login-brand">
    <img src="/images/Payxem-main-logo.png" alt="Payxem">
    <h1>Payxem CMS Admin</h1>
  </div>

  <div id="payxem-cms-footer">
    &copy; 2026 <a href="https://payxem.com">Payxem</a> &middot;
    <a href="https://app.payxem.com" target="_blank" rel="noopener">Open App</a>
  </div>

  <script src="https://unpkg.com/decap-cms@3.3.3/dist/decap-cms.js"></script>

  <script>
    // Hide custom login brand once logged in
    var observer = new MutationObserver(function() {
      var header = document.querySelector('[class*="AppHeader"]');
      var brand = document.getElementById('payxem-login-brand');
      if (header && brand) {
        brand.style.display = 'none';
        observer.disconnect();
      }
    });
    observer.observe(document.body, { childList: true, subtree: true });
  </script>
</body>
</html>
