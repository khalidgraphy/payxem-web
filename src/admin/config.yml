backend:
  name: github
  repo: khalidgraphy/payxem-web
  branch: main
  base_url: https://payxem-cms-auth.sehlkardigital.workers.dev
  auth_endpoint: /auth

logo_url: /images/Payxem-main-logo.png
site_url: https://payxem.com

media_folder: "src/images/uploads"
public_folder: "/images/uploads"

slug:
  encoding: "ascii"
  clean_accents: true

collections:

  # ─── Blog Posts ───
  - name: "blog"
    label: "Blog Posts"
    folder: "src/blog"
    create: true
    slug: "{{year}}-{{month}}-{{day}}-{{slug}}"
    extension: "md"
    editor:
      preview: false
    fields:
      - { label: "Title", name: "title", widget: "string" }
      - { label: "Description", name: "description", widget: "text", hint: "Short summary for SEO and blog cards (max ~160 chars)" }
      - { label: "Publish Date", name: "date", widget: "datetime", format: "YYYY-MM-DD", date_format: "YYYY-MM-DD", time_format: false }
      - { label: "Category", name: "category", widget: "select", options: ["Announcements", "Guides", "Tips", "Product Updates", "Industry"], default: "Guides" }
      - { label: "Featured Image", name: "featuredImage", widget: "image", required: false }
      - { label: "Featured Image Alt Text", name: "featuredImageAlt", widget: "string", required: false }
      - { label: "Read Time (minutes)", name: "readTime", widget: "number", value_type: "int", min: 1, default: 3 }
      - { label: "Body", name: "body", widget: "markdown" }

  # ─── Home Page ───
  - name: "home"
    label: "Home Page"
    files:
      - name: "home-content"
        label: "Home Page Content"
        file: "src/_data/home.json"
        editor:
          preview: false
        fields:
          - label: "Hero Section"
            name: "hero"
            widget: "object"
            fields:
              - { label: "Badge Text", name: "badge", widget: "string" }
              - { label: "Headline Line 1", name: "headline1", widget: "string" }
              - { label: "Headline Line 2", name: "headline2", widget: "string" }
              - { label: "Headline Gradient Text", name: "headlineGradient", widget: "string" }
              - { label: "Subtitle", name: "subtitle", widget: "text" }
              - { label: "CTA Primary Text", name: "ctaPrimaryText", widget: "string" }
              - { label: "CTA Primary URL", name: "ctaPrimaryUrl", widget: "string" }
              - { label: "CTA Secondary Text", name: "ctaSecondaryText", widget: "string" }
              - { label: "CTA Secondary URL", name: "ctaSecondaryUrl", widget: "string" }
              - { label: "Note", name: "note", widget: "string" }
          - label: "FAQ Section"
            name: "faq"
            widget: "object"
            fields:
              - { label: "Label", name: "label", widget: "string" }
              - { label: "Headline", name: "headline", widget: "string" }
              - label: "Questions"
                name: "items"
                widget: "list"
                fields:
                  - { label: "Question", name: "question", widget: "string" }
                  - { label: "Answer", name: "answer", widget: "text" }
          - label: "CTA Section"
            name: "cta"
            widget: "object"
            fields:
              - { label: "Headline", name: "headline", widget: "string" }
              - { label: "Description", name: "description", widget: "text" }
              - { label: "Button Text", name: "buttonText", widget: "string" }
              - { label: "Button URL", name: "buttonUrl", widget: "string" }
              - { label: "Note", name: "note", widget: "string" }

  # ─── Pages ───
  - name: "pages"
    label: "Pages"
    files:
      - name: "terms"
        label: "Terms of Service"
        file: "src/pages/terms.md"
        editor:
          preview: false
        fields:
          - { label: "Title", name: "title", widget: "string" }
          - { label: "Meta Description", name: "description", widget: "text" }
          - { label: "Last Updated", name: "lastUpdated", widget: "string" }
          - { label: "Body", name: "body", widget: "markdown" }

      - name: "privacy"
        label: "Privacy Policy"
        file: "src/pages/privacy.md"
        editor:
          preview: false
        fields:
          - { label: "Title", name: "title", widget: "string" }
          - { label: "Meta Description", name: "description", widget: "text" }
          - { label: "Last Updated", name: "lastUpdated", widget: "string" }
          - { label: "Body", name: "body", widget: "markdown" }
